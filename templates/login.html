{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <div class="auth-header">
            <div class="logo-circle">🔒</div>
            <h2>Secure Login</h2>
            <p>Access the Crop Recommendation System</p>
        </div>
        
        {% if error %}
        <div class="alert alert-error">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="input-group">
                <label for="username">Portal Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" autofocus placeholder="Enter your username">
            </div>
            
            <div class="input-group">
                <label for="password">Authentication Key</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn btn-primary full-width mt-4">Authenticate</button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have access? <a href="{{ url_for('register') }}" class="text-link">Request account</a></p>
        </div>
    </div>
</div>
{% endblock %}
